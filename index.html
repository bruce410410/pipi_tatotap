// Shuffle helper
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const CARDS = ALL_CARDS; // alias

// ─── Card Back Component ───

    <div onClick={onClick} style={{

// ─── Screen: Pick Cards ───
function PickScreen({ spread, onDone, onBack }) {
  const count = spread.count > 3 ? 3 : spread.count;
  const [deck, setDeck] = useState(() => shuffleArr(ALL_CARDS));
  const [selected, setSelected] = useState([]);
  const [visible, setVisible] = useState(true);

  const toggleCard = (i) => {
    if (selected.includes(i)) {
      setSelected(selected.filter(s=>s!==i));
    } else if (selected.length < count) {
      setSelected([...selected, i]);
    }
  };

  const shuffle = () => {
    setVisible(false);
    setSelected([]);
    setTimeout(() => { setDeck(shuffleArr(ALL_CARDS)); setVisible(true); }, 500);
  };

  const handleDone = () => {
    if (selected.length === count) {
      onDone(selected.map(i => deck[i]));
    }
  };

  return (
    <div className="screen" style={{ background:C.cream, minHeight:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'20px 24px 0', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={onBack} style={{ background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.dark,padding:'4px 0' }}>←</button>
        <div>
          <div style={{ fontSize:11, color:C.mutedLight, letterSpacing:2 }}>DRAW YOUR CARDS</div>
          <div style={{ fontSize:20, fontWeight:700, color:C.dark }}>{spread.name}</div>
        </div>
      </div>

      <div style={{ margin:'12px 24px', height:1, background:`linear-gradient(to right, ${C.terracotta}40, transparent)` }}/>

      <div style={{ padding:'0 24px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontSize:13, color:C.muted }}>靜下心來，感受每一張牌的召喚</div>
        <div style={{ fontSize:13, fontWeight:600, color:C.terracotta }}>{selected.length}/{count}</div>
      </div>

      {/* Card grid */}
      <div style={{ padding:'0 20px', flex:1 }}>
        <div style={{ display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center' }}>
          {deck.map((card, i) => (
            <CardBack key={card.id} index={i}
              size="small"
              selected={selected.includes(i)}
              onClick={() => toggleCard(i)}
              style={{ opacity: visible ? 1 : 0, transition:'opacity 0.3s' }}
            />
          ))}
        </div>
      </div>

      <div style={{ padding:'16px 24px 36px', display:'flex', flexDirection:'column', gap:10 }}>
        <button onClick={handleDone} style={{
          width:'100%', padding:'15px', borderRadius:50, border:'none', cursor:'pointer',
          background: selected.length===count ? `linear-gradient(135deg, ${C.terracotta}, #A85A38)` : C.beigeDeep,
          color: selected.length===count ? '#FAF6F1' : C.mutedLight,
          fontFamily:'Noto Serif TC', fontSize:16, fontWeight:500, letterSpacing:3,
          transition:'all 0.3s ease',
          boxShadow: selected.length===count ? `0 6px 24px ${C.terracotta}40` : 'none',
        }}>
          {selected.length===count ? '翻牌揭示 →' : `再選 ${count-selected.length} 張`}
        </button>
        <button onClick={shuffle} style={{
          background:'none', border:`1px solid ${C.beigeDeep}`, borderRadius:50, padding:'12px',
          fontFamily:'Noto Serif TC', fontSize:14, color:C.muted, cursor:'pointer', letterSpacing:2,
        }}>
          重新洗牌
        </button>
      </div>
    </div>
  );
}

// ─── Card Reveal Component ───
function RevealCard({ card, index, isFlipped, onFlip, label }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8, animation:`cardDeal 0.5s ease ${index*0.15}s both` }}>
      <div style={{ fontSize:10, color:C.mutedLight, letterSpacing:1.5 }}>{label}</div>
      <div onClick={onFlip} style={{
        width:100, height:140, borderRadius:12, cursor:'pointer', position:'relative',
        transformStyle:'preserve-3d', transition:'transform 0.6s ease',
        transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0)',
      }}>
        {/* Back face */}
        <div style={{ position:'absolute', inset:0, backfaceVisibility:'hidden', borderRadius:12, overflow:'hidden', boxShadow:'0 8px 24px rgba(0,0,0,0.18)' }}>
          <CardBack size="normal" style={{ animation:'none', boxShadow:'none', transform:'none' }}/>
        </div>
        {/* Front face */}
        <div style={{ position:'absolute', inset:0, backfaceVisibility:'hidden', transform:'rotateY(180deg)', borderRadius:12, overflow:'hidden', boxShadow:'0 8px 28px rgba(0,0,0,0.22)' }}>
          <img src={card.img} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt={card.name}/>
        </div>
      </div>
      {isFlipped && (
        <div style={{ fontSize:11, color:card.color, fontWeight:600, letterSpacing:0.5, animation:'fadeIn 0.5s ease' }}>
          {card.name}
        </div>
      )}
    </div>
  );
}

// ─── Screen: Reveal ───
function RevealScreen({ spread, cards, onRead, onBack }) {
  const count = cards.length;
  const [flipped, setFlipped] = useState([]);
  const labels3 = ['過去','現在','未來'];
  const labels1 = ['今日牌'];

  const flip = (i) => {
    if (!flipped.includes(i)) setFlipped([...flipped, i]);
  };

  return (
    <div className="screen" style={{ background:C.beige, minHeight:'100%', display:'flex', flexDirection:'column' }}>
      {/* Soft gradient bg */}
      <div style={{ position:'fixed', inset:0, background:`radial-gradient(ellipse at 50% 30%, ${C.terracotta}15, transparent 70%)`, pointerEvents:'none' }}/>
      
      <div style={{ position:'relative', zIndex:1, padding:'20px 24px 0', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={onBack} style={{ background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.dark }}>←</button>
        <div>
          <div style={{ fontSize:11, color:C.mutedLight, letterSpacing:2 }}>YOUR READING</div>
          <div style={{ fontSize:20, fontWeight:700, color:C.dark }}>翻牌揭示</div>
        </div>
      </div>

      <div style={{ position:'relative', zIndex:1, textAlign:'center', padding:'20px 24px 8px' }}>
        <div style={{ fontSize:13, color:C.muted, lineHeight:1.7 }}>
          {flipped.length === count ? '✦ 所有牌已翻開，點擊下方查看解讀' : `點擊牌面翻牌・已翻 ${flipped.length}/${count}`}
        </div>
      </div>

      {/* Cards */}
      <div style={{ position:'relative', zIndex:1, display:'flex', justifyContent:'center', gap:16, padding:'20px 24px', flexWrap:'wrap' }}>
        {cards.map((card, i) => (
          <RevealCard key={i} card={card} index={i}
            isFlipped={flipped.includes(i)}
            onFlip={()=>flip(i)}
            label={count===1 ? labels1[0] : labels3[i]}
          />
        ))}
      </div>

      {/* Hint text */}
      {flipped.length > 0 && flipped.length < count && (
        <div style={{ position:'relative', zIndex:1, textAlign:'center', padding:'0 32px', animation:'fadeIn 0.5s ease' }}>
          <div style={{ fontSize:12, color:C.mutedLight, fontStyle:'italic', letterSpacing:1 }}>繼續翻開其他的牌…</div>
        </div>
      )}

      <div style={{ flex:1 }}/>

      <div style={{ position:'relative', zIndex:1, padding:'16px 24px 36px' }}>
        <button onClick={()=>flipped.length===count&&onRead(cards)} style={{
          width:'100%', padding:'15px', borderRadius:50, border:'none', cursor:'pointer',
          background: flipped.length===count ? `linear-gradient(135deg, ${C.terracotta}, #A85A38)` : C.beigeDeep,
          color: flipped.length===count ? '#FAF6F1' : C.mutedLight,
          fontFamily:'Noto Serif TC', fontSize:16, fontWeight:500, letterSpacing:3,
          transition:'all 0.3s ease',
          boxShadow: flipped.length===count ? `0 6px 24px ${C.terracotta}40` : 'none',
        }}>
          {flipped.length===count ? '查看完整解讀 →' : `翻開所有牌後繼續 (${flipped.length}/${count})`}
        </button>
      </div>
    </div>
  );
}

// ─── Screen: Reading ───
function ReadingScreen({ spread, cards, onHome }) {
  const [activeCard, setActiveCard] = useState(0);
  const labels3 = ['過去','現在','未來'];
  const labels1 = ['今日牌'];

  return (
    <div className="screen" style={{ background:C.cream, minHeight:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'20px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:11, color:C.mutedLight, letterSpacing:2 }}>YOUR READING</div>
          <div style={{ fontSize:20, fontWeight:700, color:C.dark }}>牌義解讀</div>
        </div>
        <div style={{ fontSize:12, color:C.terracotta, fontWeight:500, letterSpacing:1 }}>
          {spread.name}
        </div>
      </div>

      <div style={{ margin:'16px 24px', height:1, background:`linear-gradient(to right, ${C.terracotta}40, transparent)` }}/>

      {/* Card selector tabs */}
      {cards.length > 1 && (
        <div style={{ padding:'0 24px 16px', display:'flex', gap:10 }}>
          {cards.map((c, i) => (
            <button key={i} onClick={()=>setActiveCard(i)} style={{
              padding:'6px 14px', borderRadius:50, border:'none', cursor:'pointer',
              background: activeCard===i ? C.terracotta : C.beige,
              color: activeCard===i ? '#fff' : C.muted,
              fontFamily:'Noto Serif TC', fontSize:12, fontWeight:500, letterSpacing:0.5,
              transition:'all 0.2s ease',
            }}>
              {cards.length===1 ? labels1[0] : labels3[i]}
            </button>
          ))}
        </div>
      )}

      {/* Active card detail */}
      <div style={{ padding:'0 24px', animation:'fadeIn 0.4s ease' }} key={activeCard}>
        <div style={{ display:'flex', gap:18, marginBottom:20 }}>
          <div style={{ flexShrink:0, width:90, height:126, borderRadius:12, overflow:'hidden', boxShadow:'0 8px 28px rgba(0,0,0,0.18)' }}>
            <img src={cards[activeCard].img} style={{ width:'100%',height:'100%',objectFit:'cover' }} alt={cards[activeCard].name}/>
          </div>
          <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:8 }}>
            <div style={{ fontSize:11, color:C.gold, letterSpacing:2 }}>
              {cards.length===1 ? labels1[0] : labels3[activeCard]}
            </div>
            <div style={{ fontSize:18, fontWeight:700, color:C.dark, letterSpacing:0.5, lineHeight:1.3 }}>
              {cards[activeCard].name}
            </div>
            <div style={{ fontSize:12, color:cards[activeCard].color, fontWeight:500 }}>
              {cards[activeCard].subtitle}
            </div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {cards[activeCard].keyword.map(k=>(
                <span key={k} style={{ padding:'3px 10px', borderRadius:50, background:`${cards[activeCard].color}18`, color:cards[activeCard].color, fontSize:11, letterSpacing:0.5 }}>{k}</span>
              ))}
            </div>
          </div>
        </div>

        {/* Meaning */}
        <div style={{ padding:'18px 20px', borderRadius:18, background:C.beige, border:`1px solid ${C.beigeDeep}`, marginBottom:16 }}>
          <div style={{ fontSize:11, color:C.gold, letterSpacing:2, marginBottom:10 }}>✦ 牌義解讀</div>
          <div style={{ fontSize:14, color:C.dark, lineHeight:1.9, fontWeight:300, textWrap:'pretty' }}>
            {cards[activeCard].meaning}
          </div>
        </div>

        {/* Energy bar */}
        <div style={{ padding:'16px 20px', borderRadius:18, background:'#fff', border:`1px solid ${C.beigeDeep}` }}>
          <div style={{ fontSize:11, color:C.mutedLight, letterSpacing:2, marginBottom:12 }}>能量強度</div>
          {['直覺力','行動力','情感'].map((label,i)=>(
            <div key={i} style={{ marginBottom:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                <span style={{ fontSize:12, color:C.muted }}>{label}</span>
                <span style={{ fontSize:12, color:C.terracotta }}>{[78,65,90][i]}%</span>
              </div>
              <div style={{ height:4, borderRadius:10, background:C.beige, overflow:'hidden' }}>
                <div style={{ height:'100%', borderRadius:10, background:`linear-gradient(to right, ${C.terracotta}, ${C.gold})`, width:`${[78,65,90][i]}%`, transition:'width 0.8s ease 0.3s' }}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:'20px 24px 36px', display:'flex', gap:10 }}>
        <button onClick={onHome} style={{
          flex:1, padding:'14px', borderRadius:50, border:`1.5px solid ${C.beigeDeep}`, cursor:'pointer',
          background:'none', fontFamily:'Noto Serif TC', fontSize:14, color:C.muted, letterSpacing:2,
        }}>
          回首頁
        </button>
        <button style={{
          flex:2, padding:'14px', borderRadius:50, border:'none', cursor:'pointer',
          background:`linear-gradient(135deg, ${C.terracotta}, #A85A38)`,
          color:'#FAF6F1', fontFamily:'Noto Serif TC', fontSize:15, fontWeight:500, letterSpacing:2,
          boxShadow:`0 6px 24px ${C.terracotta}40`,
        }}>
          儲存紀錄 ✦
        </button>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [screen, setScreen] = useState('home');
  const [spread, setSpread] = useState(null);
  const [cards, setCards] = useState([]);

  const go = (s) => setScreen(s);

  let content;
  if (screen === 'home')    content = <HomeScreen onStart={()=>go('spread')}/>;
  else if (screen === 'spread') content = <SpreadScreen onChoose={s=>{setSpread(s);go('pick')}} onBack={()=>go('home')}/>;
  else if (screen === 'pick')   content = <PickScreen spread={spread} onDone={c=>{setCards(c);go('reveal')}} onBack={()=>go('spread')}/>;
  else if (screen === 'reveal') content = <RevealScreen spread={spread} cards={cards} onRead={()=>go('reading')} onBack={()=>go('pick')}/>;
  else if (screen === 'reading') content = <ReadingScreen spread={spread} cards={cards} onHome={()=>go('home')}/>;

  return (
    <IOSDevice statusBarStyle={screen==='home' ? 'light' : 'dark'}>
      {content}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
